<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | Aura Gent</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .contact-form { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: 8px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; background: var(--bg); color: var(--text); }
    </style>
</head>
<body>
    <header><div class="logo">Aura Gent</div><nav class="nav-links"><a href="index.html">首頁</a><a href="about.html">公司簡介</a><a href="casual.html">休閒服飾</a><a href="formal.html">正式服飾</a><a href="jewelry.html">飾品</a><a href="accessories.html">配件</a><a href="others.html">其它類</a><a href="contact.html">聯絡我們</a></nav></header>
    <div class="container">
        <div class="section-title"><h2>聯絡我們</h2><p>我們隨時為您服務</p></div>
        <form class="contact-form">
            <div class="form-group"><label>您的姓名</label><input type="text" placeholder="請輸入姓名"></div>
            <div class="form-group"><label>電子郵件</label><input type="email" placeholder="example@mail.com"></div>
            <div class="form-group"><label>主旨</label><input type="text" placeholder="諮詢事項"></div>
            <div class="form-group"><label>訊息內容</label><textarea rows="5" placeholder="請在此輸入您的訊息..."></textarea></div>
            <button type="button" class="btn" style="width: 100%;">送出訊息</button>
        </form>
    </div>
    <footer><p>&copy; 2026 Aura Gent. All Rights Reserved.</p></footer>
</body>
</html>
